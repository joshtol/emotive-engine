<!DOCTYPE html>
<!--
  HELLO WORLD - Emotive Engine

  The absolute simplest working example. Start here!

  What you'll learn:
  - How to load the Emotive Engine library (UMD bundle)
  - How to create and initialize a mascot
  - How to set emotions with buttons
  - How to expose the mascot for console experiments

  Complexity: Beginner-friendly
  Next example: basic-usage.html
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World - Emotive Engine</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/examples/example-styles.css">
    <script src="/examples/record.js"></script>
</head>
<body class="example-layout">
    <div class="canvas-container">
        <canvas id="mascot-canvas"></canvas>
    </div>

    <div class="controls">
        <div class="emotion-indicator" id="emotion-indicator"></div>

        <div class="control-group">
            <h3>Emotions</h3>
            <div class="grid-4" id="emotion-buttons"></div>
        </div>
    </div>

    <div class="example-info full-width">
        <strong>Try these in the browser console:</strong><br>
        <code>mascot.setEmotion('joy')</code> - Change emotion<br>
        <code>mascot.morphTo('heart')</code> - Morph shape<br>
        <code>mascot.express('bounce')</code> - Trigger gesture<br>
        <code>mascot.setScale({ core: 2.0 })</code> - Scale up
    </div>

    <script src="/emotive-engine.js"></script>
    <script src="/examples/example-data.js"></script>
    <script src="/examples/example-init.js"></script>

    <script>
        let mascot;

        initMascot('mascot-canvas').then(m => {
            mascot = m;
            mascot.setEmotion('joy');
            showEmotionIndicator('joy');
        });

        renderEmotionButtons('emotion-buttons', emotion => {
            if (!mascot) return;
            mascot.setEmotion(emotion);
            showEmotionIndicator(emotion);
        });

        initCollapsibleSections();
    </script>
</body>
</html>
