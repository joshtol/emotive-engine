<!DOCTYPE html>
<!--
  ELEMENTAL BANNER - Social Preview Capture (1280x720)

  Captures og:image screenshots and video clips for social media.
  Dark background, centered crystal.

  Usage:
  1. Open at http://localhost:3001/examples/3d/elemental-banner.html
  2. Press 1-8 to pick an element, click to pause
  3. Press S to save PNG, R to start/stop video recording

  Controls:
  - 1-8: Jump to element (fire, water, ice, electric, earth, nature, light, void)
  - Space: Next element
  - Click: Pause/resume
  - S: Save screenshot (1200x630 PNG)
  - R: Start/stop video recording (1280x720 WebM)
  - A: Toggle alignment guides
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Elemental Banner Capture</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 1280px;
            height: 720px;
            overflow: hidden;
            background: #050505;
        }

        #scene {
            width: 1280px;
            height: 720px;
            position: relative;
            background: #050505;
        }

        /* Alignment frame — hidden by default */
        #align-frame {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            border: 1px solid rgba(255,0,0,0.4);
            pointer-events: none; z-index: 999;
            display: none;
        }
        #align-frame .h {
            position: absolute; top: 50%; left: 0; right: 0;
            height: 1px; background: rgba(255,0,0,0.2);
        }
        #align-frame .v {
            position: absolute; left: 50%; top: 0; bottom: 0;
            width: 1px; background: rgba(255,0,0,0.2);
        }
        #align-frame .safe {
            position: absolute;
            top: 10%; left: 10%; right: 10%; bottom: 10%;
            border: 1px dashed rgba(255,0,0,0.15);
        }
        #align-frame .size {
            position: absolute; bottom: 4px; left: 4px;
            font-size: 10px; color: rgba(255,0,0,0.4);
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div id="scene">
        <div id="align-frame">
            <div class="h"></div>
            <div class="v"></div>
            <div class="safe"></div>
            <div class="size">1280 × 720</div>
        </div>
    </div>

    <script type="module">
        import EmotiveMascot3D from '/emotive-engine-3d-elementals.bundled.js';

        // ═══════════════════════════════════════════════════════════════
        // SHOWCASE — most dramatic gesture per element
        // ═══════════════════════════════════════════════════════════════

        const showcase = [
            { gesture: 'firemeditation',   label: 'fire'     },
            { gesture: 'icecrown',         label: 'ice'      },
            { gesture: 'electricsurge',    label: 'electric' },
            { gesture: 'watervortex',      label: 'water'    },
            { gesture: 'voidsingularity',  label: 'void'     },
            { gesture: 'lightascend',      label: 'light'    },
            { gesture: 'earthimpact',      label: 'earth'    },
            { gesture: 'naturecleanse',    label: 'nature'   },
        ];

        const GESTURE_DURATION = 5000;
        const TRANSITION_GAP = 800;

        // ═══════════════════════════════════════════════════════════════
        // INIT MASCOT
        // ═══════════════════════════════════════════════════════════════

        const container = document.getElementById('scene');
        const mascot = new EmotiveMascot3D({
            coreGeometry: 'crystal',
            enableParticles: true,
            enablePostProcessing: true,
            enableShadows: false,
            enableControls: false,
            autoRotate: true,
            autoRotateSpeed: 0.25,
            cameraDistance: 1.45,
            fov: 30,
            minZoom: 0.9,
            maxZoom: 2.0,
            materialVariant: 'multiplexer',
            assetBasePath: '/assets',
            preloadElements: [],
            backgroundPrewarm: true,
            enableBlinking: false,
            enableBreathing: false,
        });

        mascot.init(container);
        mascot.start();
        window.mascot = mascot;

        // Nudge camera target up so crystal sits slightly below center
        setTimeout(() => {
            const cam = mascot.core3D?.renderer?.camera;
            if (cam) cam.position.y += 0.06;
        }, 500);

        // ═══════════════════════════════════════════════════════════════
        // CYCLE LOGIC
        // ═══════════════════════════════════════════════════════════════

        let currentIndex = 0;
        let paused = false;
        let cycleTimer = null;

        function showElement(index) {
            currentIndex = index;
            const item = showcase[index];

            setTimeout(() => mascot.express(item.gesture), 200);

            if (!paused) {
                clearTimeout(cycleTimer);
                cycleTimer = setTimeout(() => {
                    showElement((index + 1) % showcase.length);
                }, GESTURE_DURATION + TRANSITION_GAP);
            }
        }

        function jumpTo(index) {
            paused = true;
            clearTimeout(cycleTimer);
            showElement(index);
        }

        function togglePause() {
            paused = !paused;
            if (!paused) {
                showElement((currentIndex + 1) % showcase.length);
            } else {
                clearTimeout(cycleTimer);
            }
        }

        // ═══════════════════════════════════════════════════════════════
        // SCREENSHOT — hooks into the engine's own render loop
        //
        // preserveDrawingBuffer is false, so toDataURL/drawImage
        // return blank AFTER the frame. But gl.readPixels() works
        // if called in the SAME call stack as the render.
        //
        // Strategy: monkey-patch rAF to intercept right after the
        // full post-processing pipeline writes to the screen buffer.
        // ═══════════════════════════════════════════════════════════════

        function saveScreenshot() {
            const threeRenderer = mascot.core3D?.renderer?.renderer;
            if (!threeRenderer) {
                console.error('Cannot access Three.js renderer');
                return;
            }

            const gl = threeRenderer.getContext();
            const w = gl.drawingBufferWidth;
            const h = gl.drawingBufferHeight;

            const origRAF = window.requestAnimationFrame;
            let captured = false;

            window.requestAnimationFrame = function(cb) {
                return origRAF.call(window, function(time) {
                    cb(time);

                    if (!captured) {
                        captured = true;
                        window.requestAnimationFrame = origRAF;

                        const pixels = new Uint8Array(w * h * 4);
                        gl.readPixels(0, 0, w, h, gl.RGBA, gl.UNSIGNED_BYTE, pixels);

                        const out = document.createElement('canvas');
                        out.width = 1200;
                        out.height = 630;
                        const ctx = out.getContext('2d');

                        ctx.fillStyle = '#050505';
                        ctx.fillRect(0, 0, 1200, 630);

                        const imgData = ctx.createImageData(w, h);
                        for (let row = 0; row < h; row++) {
                            const srcOff = row * w * 4;
                            const dstOff = (h - 1 - row) * w * 4;
                            imgData.data.set(pixels.subarray(srcOff, srcOff + w * 4), dstOff);
                        }

                        const tmp = document.createElement('canvas');
                        tmp.width = w;
                        tmp.height = h;
                        tmp.getContext('2d').putImageData(imgData, 0, 0);
                        ctx.drawImage(tmp, 0, 0, 1200, 630);

                        const link = document.createElement('a');
                        link.download = `og-image-${showcase[currentIndex].label}.png`;
                        link.href = out.toDataURL('image/png');
                        link.click();
                    }
                });
            };
        }

        // ═══════════════════════════════════════════════════════════════
        // VIDEO RECORDING — captures WebGL canvas via readPixels
        //
        // Same rAF monkey-patch approach as screenshot, but continuous.
        // Reads pixels each frame, draws to an offscreen 2D canvas,
        // and feeds captureStream() into MediaRecorder.
        //
        // Output: WebM (VP9). Convert to MP4 for Twitter upload:
        //   ffmpeg -i clip.webm -c:v libx264 -pix_fmt yuv420p clip.mp4
        // ═══════════════════════════════════════════════════════════════

        let mediaRecorder = null;
        let recordedChunks = [];
        let recordingLabel = '';
        let mirrorCanvas = null;
        let mirrorCtx = null;

        function startRecording() {
            const threeRenderer = mascot.core3D?.renderer?.renderer;
            if (!threeRenderer) {
                console.error('Cannot access Three.js renderer');
                return;
            }

            const gl = threeRenderer.getContext();
            const w = gl.drawingBufferWidth;
            const h = gl.drawingBufferHeight;

            // Offscreen 2D canvas at video resolution — feeds MediaRecorder
            mirrorCanvas = document.createElement('canvas');
            mirrorCanvas.width = 1280;
            mirrorCanvas.height = 720;
            mirrorCtx = mirrorCanvas.getContext('2d');

            // Temp canvas for pixel flip (same size as WebGL buffer)
            const flipCanvas = document.createElement('canvas');
            flipCanvas.width = w;
            flipCanvas.height = h;
            const flipCtx = flipCanvas.getContext('2d');

            recordedChunks = [];
            recordingLabel = showcase[currentIndex].label;

            // Capture stream from the mirror canvas
            const stream = mirrorCanvas.captureStream(60);
            mediaRecorder = new MediaRecorder(stream, {
                mimeType: 'video/webm;codecs=vp9',
                videoBitsPerSecond: 8_000_000, // 8 Mbps — high quality
            });

            mediaRecorder.ondataavailable = (e) => {
                if (e.data.size > 0) recordedChunks.push(e.data);
            };

            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.download = `elemental-${recordingLabel}.webm`;
                link.href = url;
                link.click();
                URL.revokeObjectURL(url);
                console.log(`Saved: elemental-${recordingLabel}.webm (${(blob.size / 1024 / 1024).toFixed(1)} MB)`);
                mediaRecorder = null;
            };

            mediaRecorder.start();

            // Monkey-patch rAF to mirror each frame to the 2D canvas
            const origRAF = window.requestAnimationFrame;

            window.requestAnimationFrame = function(cb) {
                return origRAF.call(window, function(time) {
                    cb(time); // Engine renders its frame

                    if (mediaRecorder && mediaRecorder.state === 'recording') {
                        // Read pixels from WebGL
                        const pixels = new Uint8Array(w * h * 4);
                        gl.readPixels(0, 0, w, h, gl.RGBA, gl.UNSIGNED_BYTE, pixels);

                        // Flip vertically
                        const imgData = flipCtx.createImageData(w, h);
                        for (let row = 0; row < h; row++) {
                            const srcOff = row * w * 4;
                            const dstOff = (h - 1 - row) * w * 4;
                            imgData.data.set(pixels.subarray(srcOff, srcOff + w * 4), dstOff);
                        }
                        flipCtx.putImageData(imgData, 0, 0);

                        // Draw to mirror canvas at video resolution
                        mirrorCtx.fillStyle = '#050505';
                        mirrorCtx.fillRect(0, 0, 1280, 720);
                        mirrorCtx.drawImage(flipCanvas, 0, 0, 1280, 720);
                    } else {
                        // Recording stopped — restore original rAF
                        window.requestAnimationFrame = origRAF;
                    }
                });
            };

            console.log('Recording started — press R to stop');
        }

        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                // Paint final black frame so captureStream doesn't grab a white canvas
                if (mirrorCtx) {
                    mirrorCtx.fillStyle = '#050505';
                    mirrorCtx.fillRect(0, 0, 1280, 720);
                }
                mediaRecorder.stop();
                console.log('Recording stopped — saving...');
            }
            // Don't null mediaRecorder here — onstop handler needs it.
            // rAF patch will restore itself on next tick when state !== 'recording'.
        }

        function toggleRecording() {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                stopRecording();
            } else {
                startRecording();
            }
        }

        // ═══════════════════════════════════════════════════════════════
        // CONTROLS
        // ═══════════════════════════════════════════════════════════════

        container.addEventListener('click', () => togglePause());

        document.addEventListener('keydown', (e) => {
            const num = parseInt(e.key);
            if (num >= 1 && num <= showcase.length) {
                jumpTo(num - 1);
                return;
            }

            switch (e.key.toLowerCase()) {
                case ' ':
                    e.preventDefault();
                    clearTimeout(cycleTimer);
                    showElement((currentIndex + 1) % showcase.length);
                    break;
                case 'r':
                    toggleRecording();
                    break;
                case 'a':
                    const frame = document.getElementById('align-frame');
                    frame.style.display = frame.style.display === 'none' ? '' : 'none';
                    break;
                case 's':
                    saveScreenshot();
                    break;
            }
        });

        // ═══════════════════════════════════════════════════════════════
        // START
        // ═══════════════════════════════════════════════════════════════

        setTimeout(() => showElement(0), 2500);
    </script>
</body>
</html>
