<!DOCTYPE html>
<!--
  DUAL MASCOT - Emotive Engine 3D Demo

  Two mascots running independently on one page.
  Each mascot has its own animation loop and can be controlled separately.
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dual Mascot - Emotive Engine</title>
    <link rel="stylesheet" href="/examples/3d-example-style.css">
    <style>
        :root {
            --accent: #6ee7ff;
            --accent-rgb: 110, 231, 255;
        }

        body {
            background: linear-gradient(135deg, #0a1628 0%, #0d2137 50%, #0f3460 100%);
        }

        .dual-container {
            display: flex;
            gap: 20px;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        .dual-container > div {
            flex: 1;
            max-width: 50%;
            aspect-ratio: 1;
        }

        /* Status pill below each mascot label */
        .mascot-status {
            display: inline-block;
            font-size: 9px;
            padding: 2px 8px;
            border-radius: 10px;
            margin-left: 6px;
            vertical-align: middle;
        }
        .mascot-status.running { background: rgba(74, 222, 128, 0.2); color: #4ade80; }
        .mascot-status.stopped { background: rgba(248, 113, 113, 0.2); color: #f87171; }

        .log-mascot1 { color: #60a5fa; }
        .log-mascot2 { color: #fb923c; }
    </style>
</head>
<body>
    <div class="left-menu">
        <div class="section">
            <h2>Mascot 1: Crystal</h2>
            <div class="section-content">
                <div class="button-grid">
                    <button data-mascot="1" data-gesture="bounce">Bounce</button>
                    <button data-mascot="1" data-gesture="sway">Sway</button>
                    <button data-mascot="1" data-gesture="pulse">Pulse</button>
                    <button data-mascot="1" data-action="start">Start</button>
                    <button data-mascot="1" data-action="stop">Stop</button>
                </div>
                <div class="info-box" style="margin-top: 8px;">
                    <span id="status-1" class="mascot-status running">Running</span>
                </div>
            </div>
        </div>

        <div class="section">
            <h2 class="has-toggle">
                <span>Emotion</span>
                <div class="toggle-switch active" id="wobble-toggle-1">Wobble</div>
            </h2>
            <div class="section-content">
                <div class="emotion-grid" id="emotion-buttons-1"></div>
            </div>
        </div>

    </div>

    <div class="center-content">
        <div class="dual-container">
            <div id="container-1"></div>
            <div id="container-2"></div>
        </div>
        <div class="camera-hint">Drag to rotate &bull; Pinch or scroll to zoom</div>
    </div>

    <div class="right-menu">
        <div class="section">
            <h2>Mascot 2: Moon</h2>
            <div class="section-content">
                <div class="button-grid">
                    <button data-mascot="2" data-gesture="sway">Sway</button>
                    <button data-mascot="2" data-gesture="breathe">Breathe</button>
                    <button data-mascot="2" data-gesture="glow">Glow</button>
                    <button data-mascot="2" data-action="start">Start</button>
                    <button data-mascot="2" data-action="stop">Stop</button>
                </div>
                <div class="info-box" style="margin-top: 8px;">
                    <span id="status-2" class="mascot-status running">Running</span>
                </div>
            </div>
        </div>

        <div class="section">
            <h2 class="has-toggle">
                <span>Emotion</span>
                <div class="toggle-switch active" id="wobble-toggle-2">Wobble</div>
            </h2>
            <div class="section-content">
                <div class="emotion-grid" id="emotion-buttons-2"></div>
            </div>
        </div>

        <div class="section visual-controls">
            <h2 class="has-toggle collapsed">
                <span>Visuals</span>
                <div class="toggle-switch active" id="particles-toggle">Particles</div>
            </h2>
            <div class="section-content collapsed">
                <div class="toggle-control">
                    <span class="toggle-label">Core Glow</span>
                    <div class="toggle-switch active" data-action="toggle-glow"></div>
                </div>
                <div class="toggle-control">
                    <span class="toggle-label">Blinking</span>
                    <div class="toggle-switch active" data-action="toggle-blink"></div>
                </div>
                <div class="toggle-control">
                    <span class="toggle-label">Breathing</span>
                    <div class="toggle-switch active" data-action="toggle-breathing"></div>
                </div>
                <div class="toggle-control">
                    <span class="toggle-label">Auto-Rotate</span>
                    <div class="toggle-switch active" data-action="toggle-auto-rotate"></div>
                </div>
            </div>
        </div>

        <div class="section">
            <h2 class="collapsed">Log</h2>
            <div class="section-content collapsed">
                <div class="activity-log" id="activity-log"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import EmotiveMascot3D from '/emotive-engine-3d.bundled.js';
        import { createEmotionButtons, setActiveButton, createActivityLog } from '/examples/3d/demo-utils.js';

        const log = createActivityLog();

        // ═══════════════════════════════════════════════════════════════════════════
        // INITIALIZE MASCOTS
        // ═══════════════════════════════════════════════════════════════════════════
        const mascots = {};
        const statuses = {};

        log('Initializing Mascot 1 (Crystal)...', 'mascot1');
        mascots[1] = new EmotiveMascot3D({
            coreGeometry: 'crystal',
            enableParticles: true,
            enablePostProcessing: true,
            enableControls: true,
            autoRotate: true,
            cameraDistance: 1.4,
            fov: 30,
            minZoom: 0.8,
            maxZoom: 2.5,
            materialVariant: 'multiplexer',
            assetBasePath: '/assets'
        });
        mascots[1].init(document.getElementById('container-1'));
        mascots[1].start();
        statuses[1] = document.getElementById('status-1');
        log('Mascot 1 started', 'success');

        log('Initializing Mascot 2 (Moon)...', 'mascot2');
        mascots[2] = new EmotiveMascot3D({
            coreGeometry: 'moon',
            enableParticles: true,
            enablePostProcessing: true,
            enableControls: true,
            autoRotate: true,
            cameraDistance: 1.3,
            fov: 30,
            minZoom: 0.8,
            maxZoom: 2.5,
            assetBasePath: '/assets'
        });
        mascots[2].init(document.getElementById('container-2'));
        mascots[2].start();
        statuses[2] = document.getElementById('status-2');
        log('Mascot 2 started', 'success');

        // Set initial emotions
        setTimeout(() => {
            mascots[1].setEmotion('joy');
            log('Mascot 1 set to JOY', 'mascot1');
        }, 500);
        setTimeout(() => {
            mascots[2].setEmotion('calm');
            log('Mascot 2 set to CALM', 'mascot2');
        }, 1000);
        setTimeout(() => {
            log('Both mascots running independently', 'success');
        }, 1500);

        // ═══════════════════════════════════════════════════════════════════════════
        // EMOTION BUTTONS (per-mascot)
        // ═══════════════════════════════════════════════════════════════════════════
        createEmotionButtons('emotion-buttons-1', (emotion) => {
            mascots[1].setEmotion(emotion);
            log(`Mascot 1 emotion: ${emotion}`, 'mascot1');
        }, { activeEmotion: 'joy' });

        createEmotionButtons('emotion-buttons-2', (emotion) => {
            mascots[2].setEmotion(emotion);
            log(`Mascot 2 emotion: ${emotion}`, 'mascot2');
        }, { activeEmotion: 'calm' });

        // ═══════════════════════════════════════════════════════════════════════════
        // WOBBLE TOGGLES (per-mascot, wired manually since shared util is single-mascot)
        // ═══════════════════════════════════════════════════════════════════════════
        document.getElementById('wobble-toggle-1').addEventListener('click', (e) => {
            e.stopPropagation();
            const el = e.currentTarget;
            el.classList.toggle('active');
            el.classList.contains('active') ? mascots[1].enableWobble() : mascots[1].disableWobble();
        });
        document.getElementById('wobble-toggle-2').addEventListener('click', (e) => {
            e.stopPropagation();
            const el = e.currentTarget;
            el.classList.toggle('active');
            el.classList.contains('active') ? mascots[2].enableWobble() : mascots[2].disableWobble();
        });

        // ═══════════════════════════════════════════════════════════════════════════
        // VISUALS TOGGLES (shared — controls both mascots)
        // ═══════════════════════════════════════════════════════════════════════════
        const allMascots = () => Object.values(mascots);

        document.getElementById('particles-toggle').addEventListener('click', (e) => {
            e.stopPropagation();
            const el = e.currentTarget;
            el.classList.toggle('active');
            const enabled = el.classList.contains('active');
            allMascots().forEach(m => enabled ? m.enableParticles() : m.disableParticles());
        });

        document.querySelectorAll('[data-action^="toggle-"]').forEach(el => {
            el.addEventListener('click', () => {
                const action = el.dataset.action;
                el.classList.toggle('active');
                const enabled = el.classList.contains('active');

                allMascots().forEach(m => {
                    switch (action) {
                    case 'toggle-glow':
                        m.core3D?.setCoreGlowEnabled(enabled);
                        break;
                    case 'toggle-blink':
                        enabled ? m.enableBlinking() : m.disableBlinking();
                        break;
                    case 'toggle-breathing':
                        enabled ? m.enableBreathing() : m.disableBreathing();
                        break;
                    case 'toggle-auto-rotate':
                        enabled ? m.enableAutoRotate() : m.disableAutoRotate();
                        break;
                    }
                });
            });
        });

        // ═══════════════════════════════════════════════════════════════════════════
        // GESTURE & START/STOP BUTTONS
        // ═══════════════════════════════════════════════════════════════════════════
        document.querySelectorAll('button[data-mascot]').forEach(button => {
            button.addEventListener('click', () => {
                const id = button.dataset.mascot;
                const mascot = mascots[id];
                const status = statuses[id];

                if (button.dataset.gesture) {
                    mascot.express(button.dataset.gesture);
                    log(`Mascot ${id} gesture: ${button.dataset.gesture}`, `mascot${id}`);
                }
                if (button.dataset.action === 'stop') {
                    mascot.stop();
                    status.textContent = 'Stopped';
                    status.className = 'mascot-status stopped';
                    log(`Mascot ${id} STOPPED`, `mascot${id}`);
                }
                if (button.dataset.action === 'start') {
                    mascot.start();
                    status.textContent = 'Running';
                    status.className = 'mascot-status running';
                    log(`Mascot ${id} STARTED`, `mascot${id}`);
                }
            });
        });

        // Expose for console testing
        window.mascots = mascots;
        window.log = log;

        log('Ready! Control each mascot independently.', 'success');
    </script>
</body>
</html>
